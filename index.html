<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #F5C842;
      --accent-dim: rgba(245, 200, 66, 0.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 56px 24px 40px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    header .label {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    header p {
      font-size: 15px;
      color: var(--muted);
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Main ── */
    main {
      flex: 1;
      max-width: 1080px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      text-decoration: none;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
      border-color: #3a3a3a;
    }

    .card-icon {
      font-size: 32px;
      line-height: 1;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-dim);
      border-radius: 12px;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.06);
      color: #aaa;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      margin-top: 4px;
    }

    .card-cta svg {
      transition: transform 0.15s ease;
    }

    .card:hover .card-cta svg {
      transform: translateX(3px);
    }

    /* ── Nav ── */
    .header-nav {
      display: flex;
      align-items: center;
      padding: 14px 24px 0;
    }

    .breadcrumb {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .breadcrumb a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.15s;
    }

    .breadcrumb a:hover { color: var(--accent); }

    .breadcrumb .sep {
      opacity: 0.4;
      font-size: 11px;
    }

    .breadcrumb .current {
      color: var(--text);
      font-weight: 600;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #444;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <nav class="header-nav">
    <div class="breadcrumb">
      <a href="学習管理ツール/learning-dashboard.html">
        <svg width="11" height="11" viewBox="0 0 13 13" fill="none" style="vertical-align:-1px">
          <path d="M1 6.5L6.5 1 12 6.5M2.5 5.2V11.5h3V8h2v3.5h3V5.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        学習管理ツール
      </a>
      <span class="sep">›</span>
      <span class="current">練習ツール一覧</span>
    </div>
  </nav>

  <header>
    <span class="label">Practice Tools</span>
    <h1>Training Tools</h1>
    <p>デザインとAIのスキルを実践で鍛える、インタラクティブな練習ツール集。</p>
  </header>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <footer>
    &copy; 2025 Training Tools
  </footer>

  <script>
    const tools = [
      {
        icon: '🥋',
        name: 'プロンプト道場',
        desc: 'AIへの指示文を練習するゲーム形式のツール。プロンプトを入力するとS〜Cランクでリアルタイム採点・フィードバックが届く。',
        tags: ['AI', 'プロンプト', '練習'],
        href: 'prompt-dojo.html',
      },
      {
        icon: '🎨',
        name: 'UI Trend Builder',
        desc: 'Glassmorphism・Neumorphismなどのデザイントレンドをスライダー操作で再現する練習ツール。お手本と自分の操作結果をリアルタイム比較できる。',
        tags: ['デザイン', 'CSS', 'トレンド'],
        href: 'ui-trend-builder/index.html',
      },
      {
        icon: '📸',
        name: 'Photo Eye（写真審美眼）',
        desc: 'デザイン制作現場の写真素材選定眼を鍛えるトレーニングツール。Claude APIが写真の評価・フィードバックを行う。',
        tags: ['写真', '審美眼', 'AI'],
        href: 'photo-eye/index.html',
      },
    ];

    const grid = document.getElementById('grid');

    tools.forEach(tool => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = tool.href;

      a.innerHTML = `
        <div class="card-icon">${tool.icon}</div>
        <div class="card-body">
          <div class="card-title">${tool.name}</div>
          <div class="card-desc">${tool.desc}</div>
          <div class="card-tags">
            ${tool.tags.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
        </div>
        <span class="card-cta">
          開く
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2.5 7h9M7.5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      `;

      grid.appendChild(a);
    });
  </script>

</body>
</html>
